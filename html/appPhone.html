<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cửa Hàng Mua Bán Điện Thoại Di Động</title>
    <!-- link sử dụng tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- link API -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
      integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
  </head>
  <body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <!-- Header: Glassmorphism effect -->
    <header
      class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200"
    >
      <div
        class="max-w-7xl mx-auto flex items-center justify-between p-4 md:p-6"
      >
        <h1
          class="text-2xl md:text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tighter"
        >
          PhoneStore
        </h1>

        <div class="flex items-center gap-4">
          <a
            href="admin.html"
            class="hidden md:block text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors"
          >
            Quản trị hệ thống
          </a>

          <button
            id="btnGioHang"
            class="group relative bg-slate-900 text-white px-5 py-2.5 rounded-2xl hover:bg-blue-600 transition-all duration-300 shadow-lg shadow-slate-200 active:scale-95 flex items-center gap-2"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M16 11V7a4 4 0 118 0m-4 4v2m0-10V4m-2 2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5z"
              />
            </svg>
            <span class="font-bold text-sm">Giỏ hàng</span>
            <span
              id="badgeGioHang"
              class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-black w-6 h-6 rounded-full flex justify-center items-center ring-4 ring-white group-hover:ring-blue-100 transition-all"
            >
              0
            </span>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <!-- Bộ lọc & Tìm kiếm: Hiện đại & Trực quan -->
      <div
        class="mb-10 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row gap-4 items-end"
      >
        <div class="flex flex-col w-full space-y-2">
          <label
            class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1"
            >Bạn đang tìm gì?</label
          >
          <div class="relative">
            <span
              class="absolute inset-y-0 left-4 flex items-center text-slate-400"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
                />
              </svg>
            </span>
            <input
              type="search"
              id="searchInput"
              placeholder="Tên điện thoại, thương hiệu..."
              class="w-full bg-slate-50 border-none rounded-2xl pl-12 pr-4 py-3.5 focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all outline-none text-slate-700"
            />
          </div>
        </div>

        <div class="flex flex-col w-full md:w-64 space-y-2">
          <label
            class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1"
            >Thương hiệu</label
          >
          <select
            id="filterSelect"
            class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-blue-500/20 focus:bg-white transition-all outline-none font-bold text-slate-600 appearance-none"
          >
            <option value="">Tất cả hãng</option>
            <option value="iphone">Apple (iPhone)</option>
            <option value="Samsung">Samsung Galaxy</option>
            <option value="OPPO">OPPO</option>
            <option value="Vivo">Vivo</option>
            <option value="Realme">Realme</option>
            <option value="Asus">Asus (ROG Phone)</option>
            <option value="Nokia">Nokia</option>
          </select>
        </div>
      </div>

      <!-- Loading state -->
      <div id="loading" class="hidden py-20 text-center">
        <div
          class="inline-block w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"
        ></div>
        <p class="mt-4 text-slate-500 font-bold animate-pulse">
          Đang quét kho hàng...
        </p>
      </div>

      <!-- Danh sách sản phẩm -->
      <div
        id="danhSachSP"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"
      >
        <!-- Render từ JS -->
      </div>
    </main>

    <!-- Popup System: Thêm hiệu ứng backdrop-blur và animation -->

    <!-- Popup Chi tiết -->
    <div
      id="popupChiTiet"
      class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4"
    >
      <div
        id="overlay"
        class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity"
      ></div>
      <div
        class="relative bg-white rounded-[2rem] shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto animate-in fade-in zoom-in duration-300"
      >
        <button
          id="btnClose"
          class="absolute top-6 right-6 z-10 w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-red-500 hover:text-white rounded-full transition-all text-slate-500 font-bold"
        >
          ✕
        </button>
        <div id="popupContent" class="p-4 md:p-10"></div>
      </div>
    </div>

    <!-- Popup Giỏ hàng -->
    <div
      id="popupGioHang"
      class="hidden fixed inset-0 z-[60] flex items-center justify-end"
    >
      <div
        id="overlayGioHang"
        class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px]"
      ></div>
      <div
        class="relative bg-white h-full w-full max-w-md shadow-2xl flex flex-col animate-in slide-in-from-right duration-500"
      >
        <div
          class="p-6 border-b border-slate-100 flex items-center justify-between"
        >
          <h2 class="text-xl font-black text-slate-800">Giỏ hàng của bạn</h2>
          <button
            id="btnCloseGioHang"
            class="w-8 h-8 flex items-center justify-center bg-slate-50 hover:bg-slate-200 rounded-full transition-all text-slate-500 uppercase text-xs font-bold"
          >
            Đóng
          </button>
        </div>
        <div id="noiDungGioHang" class="flex-1 overflow-y-auto">
          <!-- Render từ JS -->
        </div>
      </div>
    </div>

    <script type="module" src="../appPhone.js"></script>
  </body>
</html>
