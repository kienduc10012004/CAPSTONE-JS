<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhoneStore - Cửa Hàng Di Động</title>
    <link rel="stylesheet" href="./output.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-900">

    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
      <div class="max-w-7xl mx-auto flex items-center justify-between p-4 md:p-6">
        <h1 class="text-2xl md:text-3xl font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent tracking-tighter">
          PhoneStore
        </h1>
        <div class="flex items-center gap-4">
          <a href="admin.html" class="hidden md:block text-sm font-bold text-slate-500 hover:text-blue-600 transition-colors">Quản trị hệ thống</a>
          <button id="btnGioHang" class="group relative bg-slate-900 text-white px-5 py-2.5 rounded-2xl hover:bg-blue-600 transition-all shadow-lg active:scale-95 flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 11-8 0m-4 4v2m0-10V4m-2 2H5a2 2 0 00-2 2v10a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5z" />
            </svg>
            <span class="font-bold text-sm">Giỏ hàng</span>
            <span id="badgeGioHang" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-black w-6 h-6 rounded-full flex justify-center items-center ring-4 ring-white">0</span>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
      <!-- Bộ lọc & Tìm kiếm -->
      <div class="mb-10 bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col lg:flex-row gap-6 items-end">
        <div class="flex flex-col w-full space-y-2">
          <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Bạn đang tìm gì?</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </span>
            <input type="search" id="searchInput" placeholder="Tên điện thoại, thương hiệu..." class="w-full bg-slate-50 border-none rounded-2xl pl-12 pr-4 py-3.5 focus:ring-2 focus:ring-blue-500/20 outline-none" />
          </div>
        </div>

        <div class="flex flex-col w-full lg:w-64 space-y-2">
          <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Thương hiệu</label>
          <select id="filterSelect" class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-blue-500/20 font-bold text-slate-600 appearance-none outline-none">
            <option value="">Tất cả hãng</option>
            <option value="iphone">Apple (iPhone)</option>
            <option value="Samsung">Samsung Galaxy</option>
            <option value="OPPO">OPPO</option>
            <option value="Vivo">Vivo</option>
            <option value="Realme">Realme</option>
            <option value="Asus">Asus (ROG Phone)</option>
            <option value="Nokia">Nokia</option>
          </select>
        </div>

        <div class="flex flex-col w-full lg:w-64 space-y-2">
          <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Sắp xếp giá</label>
          <select id="sortSelect" class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-blue-500/20 font-bold text-slate-600 appearance-none outline-none">
            <option value="">Mặc định</option>
            <option value="asc">Giá tăng dần ↑</option>
            <option value="desc">Giá giảm dần ↓</option>
          </select>
        </div>
      </div>

      <div id="loading" class="hidden py-20 text-center">
        <div class="inline-block w-10 h-10 border-4 border-blue-600/20 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="mt-4 text-slate-500 font-bold animate-pulse">Đang tải sản phẩm...</p>
      </div>

      <div id="danhSachSP" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <!-- Popups -->
    <div id="popupChiTiet" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
      <div id="overlay" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
      <div class="relative bg-white rounded-[2.5rem] shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-6 md:p-12 no-scrollbar">
        <button id="btnClose" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-slate-100 hover:bg-red-500 hover:text-white rounded-full transition-all text-slate-500 font-bold">✕</button>
        <div id="popupContent"></div>
      </div>
    </div>

    <div id="popupGioHang" class="hidden fixed inset-0 z-[60] flex items-center justify-end">
      <div id="overlayGioHang" class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px]"></div>
      <div class="relative bg-white h-full w-full max-w-md shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
          <h2 class="text-xl font-black text-slate-800">Giỏ hàng của bạn</h2>
          <button id="btnCloseGioHang" class="px-4 py-2 bg-slate-50 hover:bg-slate-200 rounded-xl text-slate-500 text-xs font-bold uppercase">Đóng</button>
        </div>
        <div id="noiDungGioHang" class="flex-1 overflow-y-auto no-scrollbar"></div>
      </div>
    </div>

    <script type="module" src="./js/appPhone.js"></script>
  </body>
</html>
